<svg width="1408" height="660" viewBox="0 0 1408 660" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Strategic recommendations with white background</title>
  <desc id="desc">Three recommendation cards on a pure white background: stop the realism arms race, contextual fit over CGI, and evidence-based iteration.</desc>

  <defs>
    <filter id="panelShadow" x="0" y="0" width="1408" height="660" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#172033" flood-opacity="0.10"/>
    </filter>
    <filter id="cardShadow" x="-40" y="-20" width="420" height="660" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="16" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
    <linearGradient id="emeraldCard" x1="0" y1="0" x2="300" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#59E0BA"/>
      <stop offset="0.52" stop-color="#28A789"/>
      <stop offset="1" stop-color="#126655"/>
    </linearGradient>
    <linearGradient id="orangeCard" x1="0" y1="0" x2="300" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFBE63"/>
      <stop offset="0.52" stop-color="#E58A33"/>
      <stop offset="1" stop-color="#9B4E18"/>
    </linearGradient>
    <linearGradient id="plumCard" x1="0" y1="0" x2="300" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C592F0"/>
      <stop offset="0.52" stop-color="#8B5CC2"/>
      <stop offset="1" stop-color="#4B3170"/>
    </linearGradient>
    <radialGradient id="emeraldHalo" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(144 166) rotate(90) scale(120 128)">
      <stop stop-color="#A6FFE5" stop-opacity="1"/>
      <stop offset="0.55" stop-color="#72F0CD" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#45E2B6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orangeHalo" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(144 166) rotate(90) scale(120 128)">
      <stop stop-color="#FFD997" stop-opacity="0.98"/>
      <stop offset="0.55" stop-color="#FFB45B" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#F28A34" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blueHalo" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(144 166) rotate(90) scale(120 128)">
      <stop stop-color="#E2D4FF" stop-opacity="0.96"/>
      <stop offset="0.55" stop-color="#B9D8FF" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#A6D5FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1408" height="660" fill="transparent"/>
  <g filter="url(#panelShadow)">
    <rect x="24" y="20" width="1360" height="612" rx="28" fill="#FFFFFF"/>
    <rect x="24.75" y="20.75" width="1358.5" height="610.5" rx="27.25" stroke="#E4E8EF" stroke-width="1.5"/>
  </g>

  <g transform="translate(110 86)" filter="url(#cardShadow)">
    <rect width="300" height="500" rx="22" fill="#12342E"/>
    <rect x="12" y="12" width="276" height="476" rx="18" fill="url(#emeraldCard)" stroke="#61E2BE" stroke-width="2"/>
    <rect x="20" y="20" width="260" height="460" rx="16" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <circle cx="144" cy="166" r="112" fill="url(#emeraldHalo)"/>
    <text x="150" y="72" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" letter-spacing="1.4" text-anchor="middle">RECOMMENDATION 01</text>
    <g transform="translate(84 98)">
      <polygon points="33,0 87,0 120,33 120,87 87,120 33,120 0,87 0,33" fill="none" stroke="#FFE4B4" stroke-width="6"/>
      <line x1="39" y1="39" x2="81" y2="81" stroke="#FFE4B4" stroke-width="8" stroke-linecap="round"/>
      <line x1="81" y1="39" x2="39" y2="81" stroke="#FFE4B4" stroke-width="8" stroke-linecap="round"/>
    </g>
    <text x="38" y="300" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="800">
      <tspan x="38" dy="0">Stop the realism</tspan>
      <tspan x="38" dy="38">arms race</tspan>
    </text>
  </g>

  <g transform="translate(560 86)" filter="url(#cardShadow)">
    <rect width="300" height="500" rx="22" fill="#50301A"/>
    <rect x="12" y="12" width="276" height="476" rx="18" fill="url(#orangeCard)" stroke="#FFB769" stroke-width="2"/>
    <rect x="20" y="20" width="260" height="460" rx="16" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <circle cx="144" cy="166" r="112" fill="url(#orangeHalo)"/>
    <text x="150" y="72" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" letter-spacing="1.4" text-anchor="middle">RECOMMENDATION 02</text>
    <g transform="translate(84 98)" stroke="#FFFFFF" stroke-width="6" fill="none" stroke-linecap="round">
      <circle cx="60" cy="60" r="56"/>
      <circle cx="60" cy="60" r="34"/>
      <circle cx="60" cy="60" r="14"/>
      <line x1="60" y1="0" x2="60" y2="20"/>
      <line x1="60" y1="100" x2="60" y2="120"/>
      <line x1="0" y1="60" x2="20" y2="60"/>
      <line x1="100" y1="60" x2="120" y2="60"/>
    </g>
    <text x="38" y="300" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="800">
      <tspan x="38" dy="0">Contextual fit</tspan>
      <tspan x="38" dy="38">over CGI</tspan>
    </text>
  </g>

  <g transform="translate(1010 86)" filter="url(#cardShadow)">
    <rect width="300" height="500" rx="22" fill="#332348"/>
    <rect x="12" y="12" width="276" height="476" rx="18" fill="url(#plumCard)" stroke="#C39AF7" stroke-width="2"/>
    <rect x="20" y="20" width="260" height="460" rx="16" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <circle cx="144" cy="166" r="112" fill="url(#blueHalo)"/>
    <text x="150" y="72" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" letter-spacing="1.4" text-anchor="middle">RECOMMENDATION 03</text>
    <g transform="translate(88 92)" fill="none" stroke="#FFE4B4" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M38 0H82V88C82 103 70 115 54 115C39 115 27 103 27 88V0H71"/>
      <path d="M12 90H108"/>
      <line x1="54" y1="115" x2="54" y2="144"/>
      <line x1="24" y1="144" x2="84" y2="144"/>
    </g>
    <text x="38" y="300" fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="800">
      <tspan x="38" dy="0">Evidence-based</tspan>
      <tspan x="38" dy="38">iteration</tspan>
    </text>
  </g>
</svg>
